spring:
  application:
    name: identity-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ciphermesh_identity}
    username: ${DB_USER:ciphermesh}
    password: ${DB_PASSWORD:ciphermesh}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8081
